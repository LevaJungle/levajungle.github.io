<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Перенаправление • Загрузка...</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0b1120 0%, #19223c 100%);
            font-family: 'Segoe UI', 'Inter', system-ui, -apple-system, 'Roboto', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 20px;
        }

        .loader-container {
            text-align: center;
            background: rgba(15, 25, 45, 0.6);
            backdrop-filter: blur(12px);
            border-radius: 48px;
            padding: 2rem 3rem;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.3), 0 0 0 1px rgba(88, 130, 255, 0.2);
            transition: all 0.2s ease;
        }

        .message {
            font-size: 2.2rem;
            font-weight: 600;
            letter-spacing: -0.3px;
            background: linear-gradient(120deg, #E0E7FF, #A5B9FF);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            text-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            flex-wrap: wrap;
        }

        .dots {
            display: inline-flex;
            gap: 6px;
            margin-left: 4px;
        }

        .dots span {
            width: 8px;
            height: 8px;
            background: #8aa9ff;
            border-radius: 50%;
            display: inline-block;
            animation: pulse 1.4s infinite ease-in-out both;
        }

        .dots span:nth-child(1) { animation-delay: -0.32s; background: #8aa9ff; }
        .dots span:nth-child(2) { animation-delay: -0.16s; background: #a0bbff; }
        .dots span:nth-child(3) { animation-delay: 0s; background: #b7cdff; }

        @keyframes pulse {
            0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
            40% { transform: scale(1); opacity: 1; }
        }

        .sub {
            margin-top: 0.75rem;
            font-size: 0.85rem;
            color: #9aaed9;
            font-weight: 400;
            background: rgba(255,255,255,0.05);
            padding: 8px 16px;
            border-radius: 40px;
            display: inline-block;
            backdrop-filter: blur(4px);
        }

        .manual-link {
            margin-top: 28px;
            font-size: 0.8rem;
            color: #7c8db0;
        }

        .manual-link a {
            color: #b7cdff;
            text-decoration: none;
            border-bottom: 1px dashed #4f6faf;
            transition: 0.2s;
        }

        .manual-link a:hover {
            color: white;
            border-bottom-color: #b7cdff;
        }

        @media (max-width: 550px) {
            .loader-container {
                padding: 1.8rem 1.8rem;
                width: 90%;
            }
            .message {
                font-size: 1.8rem;
            }
        }

        .loader-container {
            animation: fadeInUp 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(12px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>

<div class="loader-container">
    <div class="message">
        Загрузка
        <div class="dots">
            <span></span>
            <span></span>
            <span></span>
        </div>
    </div>
    <div class="sub">пожалуйста, подождите...</div>
    <div class="manual-link">
        ⚡ если перенаправление не происходит — <a href="#" id="forceRedirectLink">нажмите здесь</a>
    </div>
</div>

<script>
    (function() {
        // ----------------- НАСТРОЙКА ССЫЛКИ ДЛЯ ПЕРЕХОДА -----------------
        // 🔁 ИЗМЕНИТЕ ЭТУ ССЫЛКУ НА НУЖНУЮ (полный URL или относительный путь)
        const REDIRECT_URL = "tg://proxy?server=94.156.170.59&port=1443&secret=6937d59a73f69b717c7e2ccdca311223";   // <-- замените на ваш адрес
        // -----------------------------------------------------------------

        const forceLink = document.getElementById('forceRedirectLink');
        if (forceLink) {
            forceLink.href = REDIRECT_URL;
            forceLink.addEventListener('click', function(e) {
                e.preventDefault();
                window.location.replace(REDIRECT_URL);
            });
        }

        let redirectTriggered = false;
        
        function performRedirect() {
            if (redirectTriggered) return;
            redirectTriggered = true;
            window.location.replace(REDIRECT_URL);
        }
        
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', function() {
                setTimeout(performRedirect, 0);
            });
        } else {
            setTimeout(performRedirect, 0);
        }
        
        // fallback на случай блокировки
        setTimeout(function() {
            if (!redirectTriggered) {
                const manualBlock = document.querySelector('.manual-link');
                if (manualBlock) {
                    manualBlock.style.animation = 'pulseNotice 0.8s ease 2';
                    const existingMsg = document.querySelector('.sub');
                    if (existingMsg) existingMsg.innerHTML = '⚠️ автоматический переход не удался, нажмите выше ⚠️';
                }
                if (forceLink) forceLink.style.fontWeight = 'bold';
            }
        }, 1500);
        
        const styleAnim = document.createElement('style');
        styleAnim.textContent = `
            @keyframes pulseNotice {
                0% { background-color: rgba(255, 200, 100, 0); border-radius: 30px; }
                50% { background-color: rgba(255, 200, 100, 0.25); border-radius: 30px; }
                100% { background-color: rgba(255, 200, 100, 0); border-radius: 30px; }
            }
        `;
        document.head.appendChild(styleAnim);
    })();
</script>
</body>
</html>
